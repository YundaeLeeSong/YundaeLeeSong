name: Generate Profile Charts

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'metrics.json'
      - 'generate_charts.py'
      - '.github/workflows/generate-charts.yml'
  workflow_dispatch: # Allows manual triggering

jobs:
  build-and-commit:
    runs-name: Generate Charts
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push commits back to the repo
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      # Using standard python since there are no external dependencies required for the script
      - name: Run Chart Generation Script
        run: python generate_charts.py

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(charts): auto-generate updated SVG charts from metrics.json"
          file_pattern: 'assets/*.svg'
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
